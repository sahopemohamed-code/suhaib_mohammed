{% extends "routes/base.html" %}
{% block title %}Register · BusNet{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card">
        <div class="card-header text-center"><i class="bi bi-person-plus-fill me-2"></i>Create Your Account</div>
        <div class="card-body p-4">
          <form method="post">{% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
              <label class="form-label fw-semibold">{{ field.label }}</label>
              {{ field }}
              {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors.0 }}</div>{% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary w-100 py-2 mt-2"><i class="bi bi-person-check me-2"></i>Register</button>
          </form>
          <hr>
          <p class="text-center text-muted mb-0">Already have an account?
            <a href="{% url 'login' %}" class="text-decoration-none fw-bold" style="color:var(--brand)">Login here</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
