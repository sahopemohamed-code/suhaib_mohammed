{% extends "routes/base.html" %}
{% block title %}Login · BusNet{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card">
        <div class="card-header text-center"><i class="bi bi-box-arrow-in-right me-2"></i>Welcome Back</div>
        <div class="card-body p-4">
          {% if form.errors %}<div class="alert alert-danger">Invalid username or password.</div>{% endif %}
          <form method="post">{% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">Username</label>
              <input type="text" name="username" class="form-control" autofocus required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="btn btn-primary w-100 py-2 mt-2"><i class="bi bi-box-arrow-in-right me-2"></i>Login</button>
          </form>
          <hr>
          <p class="text-center text-muted mb-0">New here?
            <a href="{% url 'register' %}" class="text-decoration-none fw-bold" style="color:var(--brand)">Create an account</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
